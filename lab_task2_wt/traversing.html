  //TRAVERSING SIDEWAYS
  $(document).ready(function(){
    $("#b1").click(function(){
      $("li").siblings().each(function(){
        var k=$(this).text();
        alert(k)
      })
    })
    $("#b2").click(function(){
      $("body").siblings().each(function(){

      })
    })

      alert($('#b3').nextUntil('ul').text())
